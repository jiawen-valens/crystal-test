<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>水晶人格测试 - 命定你的能量水晶</title>
  <meta name="keywords" content="水晶人格,水晶测试,玄学,命定,情绪疗愈,小红书,自我提升">
  <meta name="description" content="25道题测你适合佩戴哪款能量水晶，精致人格推荐，专属疗愈指引。">
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div id="app">
    <!-- 顶部氛围区/欢迎页 -->
    <section class="welcome-section" id="welcome-section">
      <div class="welcome-bg"></div>
      <div class="brand-logo">💎</div>
      <h1 class="main-title">水晶人格测试</h1>
      <p class="subtitle">25道题，深入洞察你的水晶人格与能量方向</p>
      <button class="start-btn" id="startBtn">开启测试</button>
    </section>

    <!-- 测试题区 -->
    <section class="question-section hide" id="question-section">
      <div class="progress-bar" id="progress-bar">
        <div class="progress-inner" id="progress-inner"></div>
      </div>
      <div class="question-box">
        <div class="question-number" id="question-number"></div>
        <div class="question-title" id="question-title"></div>
        <div class="options" id="options"></div>
      </div>
    </section>

    <!-- 结果展示区 -->
    <section class="result-section hide" id="result-section">
      <div class="crystal-type" id="crystal-type"></div>
      <div class="secondary-type" id="secondary-type"></div>
      <div class="type-desc" id="type-desc"></div>
      <div class="crystal-img-box" id="crystal-img-box"></div>
      <div class="crystal-info" id="crystal-info"></div>
      <div class="buy-guide" id="buy-guide"></div>
      <button class="wechat-btn" id="wechatBtn">添加水晶顾问微信</button>
      <button class="wechat-btn" id="restartBtn">再测一次</button>
      <div class="cta-bottom" id="cta-bottom"></div>
    </section>
  </div>

  <script src="./script.js"></script>
</body>
</html>
